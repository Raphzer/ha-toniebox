blueprint:
  name: "Tonies — Notification changement de Tonie"
  description: >
    Envoie une notification quand un nouveau Tonie est posé sur la Toniebox.
  domain: automation
  input:
    tonie_sensor:
      name: Capteur Tonie actif
      description: Le sensor "Active Tonie" de la Toniebox
      selector:
        entity:
          domain: sensor
          integration: tonies
    notify_target:
      name: Cible notification
      default: "notify.persistent_notification"
      selector:
        text: {}

trigger:
  - platform: state
    entity_id: !input tonie_sensor

condition:
  - condition: template
    value_template: "{{ trigger.to_state.state not in ['unknown', 'unavailable', ''] }}"

action:
  - service: !input notify_target
    data:
      title: "Toniebox — Nouveau Tonie"
      message: >
        {{ trigger.to_state.attributes.get('friendly_name', 'Une Toniebox') }}
        joue maintenant : {{ trigger.to_state.state }}
